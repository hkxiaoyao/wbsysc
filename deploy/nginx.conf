# Nginx 反向代理配置（生产）
# - HTTPS 终止（证书放 /etc/nginx/ssl/）
# - MCP Streamable HTTP 透传（长连接、SSE）
# - 管理后台 UI 静态加速
# - 限流 + 安全头

# 限流区：MCP 调用按租户限，admin 登录防爆破
limit_req_zone $binary_remote_addr zone=mcp:30m rate=120r/m;
limit_req_zone $binary_remote_addr zone=admin_login:10m rate=5r/m;

upstream wbsysc_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name mcp.example.com;
    # 80 强制跳 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mcp.example.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # 请求体上限（MCP 工具参数 + 管理表单）
    client_max_body_size 4m;

    # ---------- MCP Gateway（Streamable HTTP） ----------
    # MCP 用 POST + SSE 流式响应，必须关 buffer、拉长超时、支持 DELETE（会话）
    location /mcp {
        limit_req zone=mcp burst=20 nodelay;
        proxy_pass http://wbsysc_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # MCP 会话需要粘性 + 流式，禁缓冲，超时拉长
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # 支持 DELETE（部分 MCP transport 用）
        proxy_method $request_method;
    }

    # ---------- 管理后台 API ----------
    location /admin/api/ {
        # 兼容：若前端用 /admin/api 前缀（当前直连 /admin/*，可移除）
        proxy_pass http://wbsysc_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location ~ ^/admin/(login|logout|session|tenants) {
        proxy_pass http://wbsysc_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 登录接口额外限流防爆破
        if ($request_uri ~* "login") {
            limit_req zone=admin_login burst=3 nodelay;
        }
    }

    # ---------- 管理后台 UI（静态） ----------
    location /admin/ui/ {
        proxy_pass http://wbsysc_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # 静态资源加大缓存
        location ~* \.(js|css|woff2?|svg|png|jpg)$ {
            proxy_pass http://wbsysc_backend;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---------- 健康检查 ----------
    location = /health {
        proxy_pass http://wbsysc_backend;
        access_log off;
    }

    # 隐藏版本
    server_tokens off;
}