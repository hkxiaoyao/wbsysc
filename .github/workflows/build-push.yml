# GitHub Actions: 构建镜像推送 GHCR
# 主人 push 到 main → 自动构建镜像 → 推到 ghcr.io/hkxiaoyao/wbsysc
# 服务器直接 docker pull，无需本机构建
name: Build and Push Image

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'admin-ui/src/**'
      - 'admin-ui/package.json'
      - 'admin-ui/pnpm-lock.yaml'
      - 'admin-ui/vite.config.js'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'requirements.txt'
  workflow_dispatch:   # 支持手动触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # hkxiaoyao/wbsysc

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # GHCR 推送必需

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha                   # 按 commit sha 打标签
            type=raw,value=latest,enable={{is_default_branch}}   # main 分支额外打 latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max