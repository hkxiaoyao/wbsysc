# 多租户生产编排
# 模式一（推荐）：拉 GHCR 镜像（GitHub Actions 已构建推送）
#   docker compose -f docker-compose.yml up -d
# 模式二：本机构建（无 GHCR 时）
#   docker compose -f docker-compose.yml up -d --build
# 通过 BUILD_MODE 控制：pull(默认,拉镜像) / build(本机构建)
services:
  wbsysc:
    # 拉镜像模式：用 GHCR 推送的镜像
    # 本机构建模式：注释下面 image 取消注释 build
    image: ghcr.io/hkxiaoyao/wbsysc:latest
    # build: .
    container_name: wbsysc-gateway
    restart: unless-stopped
    env_file:
      - .env
    # 生产由 Nginx 反代，容器内只暴露给宿主/内网
    ports:
      - "127.0.0.1:8001:8001"
    # 同台部署：容器访问宿主 MySQL（DB_HOST 填 host.docker.internal）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # .env 挂载（含 ADMIN_PASSWORD / DB / 凭证主密钥）
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - wbsysc-net

networks:
  wbsysc-net:
    driver: bridge