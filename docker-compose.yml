# 多租户生产编排
# 模式一（推荐）：拉 GHCR 镜像（GitHub Actions 已构建推送）
#   docker compose -f docker-compose.yml up -d
# 模式二：本机构建（无 GHCR 时）
#   docker compose -f docker-compose.yml up -d --build
# 通过 BUILD_MODE 控制：pull(默认,拉镜像) / build(本机构建)
services:
  wbsysc:
    # 拉镜像模式：用 GHCR 推送的镜像
    # 本机构建模式：注释下面 image 取消注释 build
    image: ghcr.io/hkxiaoyao/wbsysc:latest
    # build: .
    container_name: wbsysc-gateway
    restart: unless-stopped
    env_file:
      - .env
    # 生产由 Nginx 反代，但暂用 0.0.0.0 暴露（Nginx/防火墙层可再收紧）
    ports:
      - "8001:8001"
    # 同台部署：容器访问宿主 MySQL（DB_HOST 填 host.docker.internal）
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 注意：不挂载 .env 文件进容器（避免容器内appuser读文件无权限 + MCP SDK读.env崩）
    # env_file 已注入环境变量，pydantic-settings 直接从 env 读，绕开文件权限问题
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - wbsysc-net

networks:
  wbsysc-net:
    driver: bridge